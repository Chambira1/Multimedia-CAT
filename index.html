<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Save Our Wildlife</h1>
        
        <div class="video-wrapper">
            <video id="wildlife-video" controls poster="placeholder.jpg">

        </button>
    </main>

    <script src="script.js"></script>

</html>
